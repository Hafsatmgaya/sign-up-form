<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2> 90 day launch circle</h2>
        </div>
        <div class="form-side"> <h1>Still clocking in for someone else's dream?</h1>
            <p>The 90-Day Launch Circle was built for 9-to-5 workers who are ready to finally 
                bet on themselves and build something of their own. </p>
                <p>Apply now and let's get you started. </p>
                <p><em>You know you're ready.</em></p>
                <form>
            <div class="form-row"> 
                <h3>Let's do this!</h3>
                <label for="full-name"> Full name</label>
                <input id="full-name" type="text">
                <label for="email-address"> Email adress</label>
                <input id="email-address" name="email" type="email" placeholder="yusuf@gmail.com">
                <label for="phone-no"> phone number</label>
                <input id="phone-no" type="number">
                <label for="current-job"> Current job/industry</label>
                <input id="current-job" type="text">
                <label for="biggest-challenge"> What is your biggest challenge right no?</label>
                <input id="biggest-challenge" type="text">
                <label for="about-us"> How did you hear about us</label>
                <input id="about-us" type="text">
            </div>
            </form>
             <button> Join the circle</button>  
        </div>
    </div>
</body>
</html>
